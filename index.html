<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Status</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <style>
        :root { --pico-font-size: 14px; }
        .new-badge { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
        .pdf-link { color: #d93025; font-weight: bold; text-decoration: none; }

        /* Hides the red warning/error toast boxes from the UI */
        py-script-status, .py-error, .py-warning, mpy-loader {
            display: none !important;
        }
    </style>
</head>
<body class="container">
    <nav>
        <ul><li><strong>Startup 🚀 Status</strong></li></ul>
        <ul>
            <li><button id="update-btn" py-click="main_workflow">🔄 Update All</button></li>
            <li><button class="secondary" onclick="document.getElementById('settings').showModal()">⚙️</button></li>
        </ul>
    </nav>

    <dialog id="settings">
        <article>
            <header>Settings</header>
            <label>Gemini API Key <input type="password" id="api-key-input"></label>
            <label>Service Account JSON <textarea id="json-key-input" rows="4"></textarea></label>
            <footer><button onclick="save_settings()">Save to iPhone</button></footer>
        </article>
    </dialog>

    <main id="dashboard">
        <p id="status">Loading portfolio from Google Sheets...</p>
    </main>

<script type="py" config="pyscript.json">
        import js
        import json
        import asyncio
        import warnings
        import logging
        import gspread
        from google.oauth2.service_account import Credentials
        from pyscript import document

        # Silence noisy OpenSSL warnings
        warnings.filterwarnings("ignore", category=UserWarning, module="cryptography")
        # Also silence common logging noise
        logging.getLogger("google_auth_httplib2").setLevel(logging.ERROR)
        # Set an environment variable that some libraries check to reduce log noise
        os.environ["PYTHONWARNINGS"] = "ignore"
    
        # Global list to hold our data once loaded
        startup_portfolio = []

        def get_saved_keys():
            """Pulls the Gemini Key and Google JSON from browser/iPhone storage"""
            gemini_key = js.localStorage.getItem('gemini_key')
            g_json_str = js.localStorage.getItem('g_json')
            
            if not gemini_key or not g_json_str:
                js.console.warn("Keys missing in local storage. Please click ⚙️ to set them.")
                return None, None
            
            try:
                return gemini_key, json.loads(g_json_str)
            except Exception as e:
                js.console.error(f"Error parsing JSON Key: {e}")
                return None, None

        async def load_from_sheets():
            """The actual connection to Google Sheets"""
            global startup_portfolio
            document.querySelector("#status").innerText = "Connecting to Google..."
            
            gemini_key, g_json = get_saved_keys()
            if not g_json:
                document.querySelector("#status").innerText = "⚠️ Missing Settings! Click the ⚙️ icon."
                return

            try:
                # Authenticate with Google
                scopes = ["https://www.googleapis.com/auth/spreadsheets", "https://www.googleapis.com/auth/drive"]
                creds = Credentials.from_service_account_info(g_json, scopes=scopes)
                client = gspread.authorize(creds)
                
                # Open your specific sheet
                sheet = client.open("Startup-Status").sheet1
                rows = sheet.get_all_records()
                
                # Standardize columns to match our UI (Name, URL, Summary, Source, PDF, Status)
                startup_portfolio = []
                for r in rows:
                    startup_portfolio.append({
                        "name": r.get("Name", "Unnamed"),
                        "url": r.get("URL", "#"),
                        "summary": r.get("Summary", "No summary yet."),
                        "source": r.get("Best Source", "#"),
                        "pdf": r.get("Latest PDF", ""),
                        "is_new": str(r.get("Status", "")).lower() == "new"
                    })
                
                document.querySelector("#status").style.display = "none"
                render_ui()
                
            except Exception as e:
                document.querySelector("#status").innerText = f"❌ Connection Error: {str(e)}"
                js.console.error(f"Sheet Error: {e}")

def render_ui():
            """Renders the cards based on the startup_portfolio list"""
            html = ""
            
            # --- Empty State Check ---
            if not startup_portfolio:
                html = """
                <article>
                    <p><strong>No startups found.</strong></p>
                    <p>Make sure your Google Sheet 'Startup-Status' has data in the 'Name' and 'URL' columns!</p>
                </article>
                """
                document.querySelector("#dashboard").innerHTML = html
                return

            # --- Loop through Startups ---
            for s in startup_portfolio:
                pdf_url = s['pdf']
                
                # 1. Clean up Google Drive links if they exist
                if pdf_url and "drive.google.com" in pdf_url and "/file/d/" in pdf_url:
                    try:
                        file_id = pdf_url.split("/file/d/")[1].split("/")[0]
                        # 'preview' is better than 'view' or 'uc' for iOS Safari
                        pdf_url = f"https://drive.google.com/file/d/{file_id}/preview"
                    except Exception:
                        pass # Keep original link if parsing fails

                # 2. Build the visual components
                pdf_btn = f'<a href="{pdf_url}" class="pdf-link" target="_blank">📄 View Investor PDF</a>' if pdf_url else ""
                badge = '<span class="new-badge">NEW</span>' if s['is_new'] else ""
                
                # 3. Assemble the card
                html += f"""
                <article>
                    <header>
                        <strong>{s['name']}</strong> {badge}
                        <a href="{s['url']}" target="_blank" style="float:right">Site ↗</a>
                    </header>
                    <p>{s['summary']}</p>
                    <footer>
                        <small>Source: <a href="{s['source']}" target="_blank">Deep Dive ↗</a></small>
                        <div style="margin-top:10px">{pdf_btn}</div>
                    </footer>
                </article>
                """
            
            # Inject the final HTML into the dashboard
            document.querySelector("#dashboard").innerHTML = html

async def main_workflow(event):
            """Triggered by the 'Update All' button"""
            btn = document.querySelector("#update-btn")
            status_text = document.querySelector("#status")
            btn.aria_busy = "true"
            status_text.style.display = "block"
            
            gemini_key, g_json = get_saved_keys()
            if not gemini_key:
                status_text.innerText = "⚠️ Missing Gemini Key! Click ⚙️."
                btn.aria_busy = "false"
                return

            # Initialize Gemini Client
            client = genai.Client(api_key=gemini_key)

            try:
                # 1. Re-connect to Google Sheets
                scopes = ["https://www.googleapis.com/auth/spreadsheets", "https://www.googleapis.com/auth/drive"]
                creds = Credentials.from_service_account_info(g_json, scopes=scopes)
                gc = gspread.authorize(creds)
                sheet = gc.open("Startup-Status").sheet1
                all_data = sheet.get_all_records()

                # 2. Loop through each startup (starting at row 2)
                for i, row in enumerate(all_data, start=2):
                    name = row.get("Name")
                    status_text.innerText = f"🔍 Researching {name}..."
                    
                    # Gemini Search & Compare Prompt
                    prompt = f"""
                    Research the startup '{name}'. 
                    Official Site: {row.get('URL')}
                    Last Best Source: {row.get('Best Source')}
                    Current Summary: {row.get('Summary')}

                    Task: 
                    1. Find any major news from 2025 or 2026 (funding, product, hires).
                    2. If new info exists, write a 2-3 sentence updated summary.
                    3. If no significant changes, return 'NO_CHANGE'.
                    4. Identify the URL of the best source you found.

                    Output Format: 
                    SUMMARY: [Your text]
                    SOURCE: [URL]
                    """

                    # Execute Gemini Research
                    response = client.models.generate_content(
                        model="gemini-2.5-flash", 
                        contents=prompt,
                        config={"tools": [{"google_search": {}}]}
                    )
                    
                    result = response.text
                    
                    if "NO_CHANGE" not in result:
                        # Parse the result (simple split)
                        try:
                            new_summary = result.split("SUMMARY:")[1].split("SOURCE:")[0].strip()
                            new_source = result.split("SOURCE:")[1].strip()
                            
                            # Update the Google Sheet row
                            # Assuming Column C is Summary, D is Best Source, E is PDF, F is Status
                            sheet.update_cell(i, 3, new_summary)
                            sheet.update_cell(i, 4, new_source)
                            sheet.update_cell(i, 6, "New") # Column F
                        except:
                            js.console.log(f"Gemini output for {name} was messy.")

                status_text.innerText = "✅ All research updated!"
                await load_from_sheets() # Refresh the dashboard view
                
            except Exception as e:
                status_text.innerText = f"❌ Error: {str(e)}"
                js.console.error(e)

            btn.aria_busy = "false"
    </script>

    <script>
        function save_settings() {
            localStorage.setItem('gemini_key', document.getElementById('api-key-input').value);
            localStorage.setItem('g_json', document.getElementById('json-key-input').value);
            document.getElementById('settings').close();
            alert("Settings saved locally to your device!");
        }
    </script>
</body>
</html>
